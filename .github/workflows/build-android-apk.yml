name: Build Android APK (Local)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install
        working-directory: ./client

      - name: Setup symlink for node_modules
        run: |
          ln -sf client/node_modules node_modules
        working-directory: .

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean --no-install
        working-directory: ./client

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        working-directory: ./client/android

      - name: Build Release APK
        run: ./gradlew assembleRelease
        working-directory: ./client/android

      - name: Find and copy APK
        run: |
          APK=$(find ./client/android -name "*.apk" -not -path "*/build/*" -not -path "*/.gradle/*" | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" ./app-release.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ./app-release.apk
          retention-days: 30
