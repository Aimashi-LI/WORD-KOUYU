name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'client/pnpm-lock.yaml'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: ./client
        run: pnpm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        working-directory: ./client
        run: chmod +x android/gradlew || true

      - name: Build with Gradle
        working-directory: ./client
        run: |
          # 运行 Expo prebuild 生成 Android 项目
          npx expo prebuild --platform android --clean

          # 构建 APK
          cd android
          ./gradlew assembleRelease

      - name: Find and Upload APK
        run: |
          echo "Searching for APK files..."
          find client -name "*.apk" -type f

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: client/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create Release Summary
        run: |
          echo "## 🎉 构建成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "APK 文件已作为 artifact 上传，请从 Actions 页面下载。" >> $GITHUB_STEP_SUMMARY
