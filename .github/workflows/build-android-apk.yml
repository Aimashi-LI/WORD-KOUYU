name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    # 禁用缓存，确保干净构建
    env:
      cache: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install npm dependencies
        run: npm ci
        working-directory: ./client

      - name: Install EAS CLI
        run: npm install -g eas-cli
        working-directory: ./client

      - name: Setup EAS
        working-directory: ./client
        run: |
          if [ ! -f eas.json ]; then
            echo '{"cli":{"version":">= 7.0.0"},"build":{"preview":{"distribution":"internal","android":{"buildType":"apk"}}}}' > eas.json
          fi

      - name: Build APK
        working-directory: ./client
        timeout-minutes: 60
        run: |
          eas build:configure --non-interactive || true
          eas build --platform android --profile preview --non-interactive --local --output ./app-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ./client/app-release.apk
          retention-days: 30
