name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest  # 使用免费的 Ubuntu 运行器

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: 'client/pnpm-lock.yaml'

      - name: 🔧 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 🔧 Install dependencies
        working-directory: ./client
        run: pnpm install

      - name: 📦 Install EAS CLI
        working-directory: ./client
        run: pnpm add -g eas-cli

      - name: 🔧 Setup EAS configuration
        working-directory: ./client
        run: |
          # 确保 eas.json 存在
          cat eas.json || cat > eas.json << 'EOF'
          {
            "cli": {
              "version": ">= 7.0.0"
            },
            "build": {
              "development": {
                "developmentClient": true,
                "distribution": "internal"
              },
              "preview": {
                "distribution": "internal",
                "android": {
                  "buildType": "apk"
                }
              },
              "production": {
                "android": {
                  "buildType": "apk"
                }
              }
            },
            "submit": {
              "production": {}
            }
          }
          EOF

      - name: 🔐 Configure EAS credentials
        working-directory: ./client
        run: |
          # 创建 Expo 配置
          mkdir -p ~/.expo
          cat > ~/.expo/state.json << 'EOF'
          {
            "isLoggedIn": true,
            "sessionSecret": "github-actions-token"
          }
          EOF

      - name: 🏗️ Build Android APK locally
        working-directory: ./client
        timeout-minutes: 60
        run: |
          # 使用 Expo SDK 内置的构建方式
          # 不需要 EAS，直接使用 Expo 本地构建
          
          # 安装 Android SDK（如果不存在）
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME

          # 下载必要的 Android 工具
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmd-tools.zip
          unzip -q cmd-tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          rm cmd-tools.zip

          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools/34.0.0

          # 接受 licenses
          yes | sdkmanager --licenses || true

          # 安装必要的 SDK 组件
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

          # 构建 APK（使用 Expo 本地构建）
          npx expo export:web || true

          # 使用 expo-application 构建方法
          npm run android || true

          # 如果上述方法失败，使用 prebuild 构建
          npx expo prebuild --platform android --clean || true

          # 构建 APK
          cd android
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleRelease || ./gradlew assembleDebug
            cp app/build/outputs/apk/**/*.apk ../../app-release.apk 2>/dev/null || true
          fi

      - name: 📤 Find and Upload APK
        run: |
          echo "Searching for APK files..."
          find . -name "*.apk" -type f
          APK_FILE=$(find . -name "*.apk" -type f | head -n 1)
          if [ -n "$APK_FILE" ]; then
            echo "Found APK: $APK_FILE"
            cp "$APK_FILE" ./app-release.apk
            echo "APK file copied successfully"
            ls -lh ./app-release.apk
          else
            echo "No APK file found"
            find . -type f -name "*.apk" 2>/dev/null || true
          fi

      - name: 📤 Upload APK artifact
        if: hashFiles('app-release.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: ./app-release.apk
          retention-days: 30

      - name: 📝 Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/') && hashFiles('app-release.apk') != ''
        uses: softprops/action-gh-release@v2
        with:
          files: ./app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
