name: Build Android APK (Local)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install
        working-directory: ./client

      - name: Generate Android project
        run: |
          echo "=== Running expo prebuild ==="
          npx expo prebuild --platform android --clean --no-install
        working-directory: ./client

      - name: Install Android dependencies
        run: ./gradlew dependencies
        working-directory: ./client/android

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        working-directory: ./client/android

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        working-directory: ./client/android

      - name: Find and copy APK
        run: |
          echo "=== Finding APK files ==="
          find ./client -name "*.apk" -type f
          APK=$(find ./client/android -name "*.apk" -not -path "*/build/*" -not -path "*/.gradle/*" | head -1)
          if [ -n "$APK" ]; then
            echo "Found APK: $APK"
            cp "$APK" ./app-release.apk
            ls -la ./app-release.apk
          else
            echo "No APK found!"
            find ./client -name "*.apk" 2>/dev/null
          fi

      - name: Upload APK
        if: fileExists('./app-release.apk')
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ./app-release.apk
          retention-days: 30
