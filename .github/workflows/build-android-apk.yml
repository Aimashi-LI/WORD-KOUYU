name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest  # 使用免费的 Ubuntu 运行器

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: 'client/pnpm-lock.yaml'

      - name: 🔧 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 🔧 Install dependencies
        working-directory: ./client
        run: pnpm install

      - name: 📦 Install EAS CLI
        working-directory: ./client
        run: pnpm add -g eas-cli

      - name: 🔧 Setup EAS configuration
        working-directory: ./client
        run: |
          # 确保 eas.json 存在
          cat eas.json || cat > eas.json << 'EOF'
          {
            "cli": {
              "version": ">= 7.0.0"
            },
            "build": {
              "development": {
                "developmentClient": true,
                "distribution": "internal"
              },
              "preview": {
                "distribution": "internal",
                "android": {
                  "buildType": "apk"
                }
              },
              "production": {
                "android": {
                  "buildType": "apk"
                }
              }
            },
            "submit": {
              "production": {}
            }
          }
          EOF

      - name: 🏗️ Build Android APK with EAS
        working-directory: ./client
        timeout-minutes: 90
        run: |
          # 初始化 EAS 项目
          eas build:configure || true

          # 使用 EAS 云端构建（免费额度每月 30 次）
          eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📤 Find and Upload APK
        run: |
          find . -name "*.apk" -type f
          APK_FILE=$(find . -name "*.apk" -type f | head -n 1)
          if [ -n "$APK_FILE" ]; then
            echo "Found APK: $APK_FILE"
            cp "$APK_FILE" ./app-release.apk
            echo "APK file copied successfully"
          else
            echo "No APK file found"
            find . -type f -name "*.apk" 2>/dev/null || true
            ls -la ./client/ 2>/dev/null || true
          fi

      - name: 📤 Upload APK artifact
        if: hashFiles('app-release.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: ./app-release.apk
          retention-days: 30

      - name: 📝 Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/') && hashFiles('app-release.apk') != ''
        uses: softprops/action-gh-release@v2
        with:
          files: ./app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
