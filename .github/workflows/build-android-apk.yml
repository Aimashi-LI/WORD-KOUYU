name: Build Android APK (Local Build)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install
        working-directory: ./client

      - name: Install EAS CLI
        run: npm install -g eas-cli
        working-directory: ./client

      - name: Setup EAS configuration
        run: |
          if [ ! -f eas.json ]; then
            cat > eas.json << 'EOF'
            {
              "cli": {
                "version": ">= 7.0.0"
              },
              "build": {
                "preview": {
                  "distribution": "internal",
                  "android": {
                    "buildType": "apk"
                  }
                }
              }
            }
            EOF
          fi

      - name: Build Android APK
        working-directory: ./client
        timeout-minutes: 60
        run: |
          eas build:configure || true
          eas build --platform android --profile preview --non-interactive --local --output ./app-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: ./client/app-release.apk
          retention-days: 30
